<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TEST ENGINE XRSTARTER <V0 class="0 1"></V0></title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- THREE.js -->
<script src="/static/js/three.min.js"></script>
<script src="/static/js/OBJLoader.js"></script>
<style>
/* ------------------- GLOBAL ------------------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Orbitron", sans-serif;
}

body {
    background: #020204;
    color: #0ff;
    overflow: hidden;
}

/* ------------------- ANIMATED GRID BACKGROUND ------------------- */
.bg-grid {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background-size: 40px 40px;
    background-image:
        linear-gradient(to right, rgba(0,255,255,0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,255,255,0.08) 1px, transparent 1px);
    animation: gridMove 12s linear infinite;
    z-index: -2;
}

@keyframes gridMove {
    from { background-position: 0 0; }
    to { background-position: 40px 40px; }
}

/* Glowing overlay */
.bg-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,255,255,0.12), transparent 60%);
    z-index: -1;
}

/* ------------------- HEADER ------------------- */
h2 {
    text-align: center;
    margin-top: 20px;
    color: #0ff;
    text-shadow: 0 0 10px #0ff;
    font-size: 28px;
}

/* ------------------- PANEL (UPLOAD & STATUS) ------------------- */
.panel {
    position: absolute;
    top: 90px;
    left: 30px;
    width: 350px;
    padding: 20px;
    background: rgba(0, 20, 30, 0.4);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 12px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(0,255,255,0.1);
}

.panel label {
    font-size: 14px;
    opacity: 0.8;
}

#fileUpload {
    margin-top: 10px;
    width: 100%;
    padding: 6px;
    background: rgba(0,255,255,0.1);
    border: 1px solid #0ff;
    border-radius: 6px;
    color: #0ff;
}

button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    font-size: 15px;
    background: rgba(0,255,255,0.2);
    border: 1px solid #0ff;
    color: #0ff;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: rgba(0,255,255,0.45);
    box-shadow: 0 0 15px #0ff;
}

#status {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
}

/* ------------------- VIEWER ------------------- */
#viewer-wrapper {
    position: absolute;
    right: 40px;
    top: 80px;
    width: 60vw;
    height: 70vh;
    padding: 10px;
    border-radius: 16px;
    background: rgba(0,40,60,0.25);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(0,255,255,0.3);
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
}

#viewer {
    width: 100%;
    height: 100%;
}

canvas {
    border-radius: 12px;
}

/* Responsive for mobile */
@media (max-width: 900px) {
    #viewer-wrapper {
        width: 90vw;
        left: 5vw;
        top: 380px;
        height: 45vh;
    }
    .panel {
        width: 90vw;
        left: 5vw;
    }
}
</style>
</head>

<body>

<!-- Background -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<h2>XRSTARTER TEST ENGINE <V0 class="O O 1"></V0></h2>

<!-- PANEL (Upload + Status) -->
<div class="panel">
    <label>Select OBJ File</label>
    <input type="file" id="fileUpload">

    <button onclick="uploadOBJ()">Upload OBJ</button>

    <p id="status">Waiting for updates...</p>
</div>

<!-- 3D VIEWER -->
<div id="viewer-wrapper">
    <div id="viewer"></div>
</div>

<!-- ================== 3D ENGINE JS ================== -->
<script>
let scene, camera, renderer, mesh = null;

function init3D() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(60, viewer.offsetWidth / viewer.offsetHeight, 0.1, 1000);
    camera.position.set(0, 1, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.offsetWidth, viewer.offsetHeight);
    renderer.setClearColor(0x000000, 0);
    document.getElementById("viewer").appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(5, 10, 5);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    requestAnimationFrame(loop);
}

// LOOP
function loop() {
    fetch("/status")
        .then(r => r.json())
        .then(d => {
            document.getElementById("status").innerText =
                `Scale=${d.scale.toFixed(2)}  Rot=${d.rotation.toFixed(2)}`;

            if (mesh) {
                mesh.scale.set(d.scale, d.scale, d.scale);
                mesh.rotation.y = d.rotation;
            }
        });

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
}

// UPLOAD
function uploadOBJ() {
    let file = document.getElementById("fileUpload").files[0];
    if (!file) return;

    let fd = new FormData();
    fd.append("objfile", file);

    fetch("/upload", { method: "POST", body: fd })
        .then(r => r.json())
        .then(d => loadModel("/uploads/" + d.path));
}

// LOAD MODEL
function loadModel(path) {
    const loader = new THREE.OBJLoader();

    loader.load(path, obj => {

        if (mesh) scene.remove(mesh);

        mesh = obj;

        mesh.scale.set(0.5, 0.5, 0.5);
        mesh.position.set(0, -1, 0);

        mesh.traverse(child => {
            if (child.isMesh) {
                child.material.side = THREE.DoubleSide;
                child.geometry.computeVertexNormals();
            }
        });

        scene.add(mesh);
    });
}

init3D();
</script>

</body>
</html>
